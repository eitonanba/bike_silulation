<!doctype html>
<html lang="ja">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>Bike Map Simulator - Free Drive</title>
<style>
  html, body { margin: 0; height: 100%; overflow: hidden; background: #111; font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
  canvas { display: block; width: 100vw; height: 100vh; background: #111; touch-action: none; }
  .panel {
    position: fixed; left: max(10px, env(safe-area-inset-left)); top: max(10px, env(safe-area-inset-top));
    color: #f5f5f5; background: rgba(0,0,0,.66); padding: 10px 12px; border-radius: 12px;
    line-height: 1.42; font-size: 13px; user-select: none; -webkit-user-select: none;
    box-shadow: 0 4px 18px rgba(0,0,0,.38); max-width: min(620px, calc(100vw - 28px));
    backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px);
  }
  .panel b { font-size: 15px; }
  .panel.compact .details, .panel.compact #status { display: none; }
  .row { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; margin-top: 8px; }
  button {
    background: rgba(34,34,34,.92); color: #fff; border: 1px solid #777; border-radius: 10px;
    padding: 8px 12px; cursor: pointer; min-height: 42px; touch-action: none; font-weight: 650;
  }
  button:hover { background: #333; }
  button.active { background: #0b5; border-color: #9fd; color: #031; font-weight: 800; }
  .hint { color: #cfcfcf; font-size: 12px; margin-top: 6px; }
  .warning { color: #ffd27d; font-weight: 700; }
  .tap-hint {
    position: fixed; left: 50%; bottom: calc(112px + env(safe-area-inset-bottom)); transform: translateX(-50%);
    color: rgba(255,255,255,.72); background: rgba(0,0,0,.36); border-radius: 999px;
    padding: 6px 12px; font-size: 12px; pointer-events: none; user-select: none; white-space: nowrap;
  }
  .touch {
    position: fixed; left: 0; right: 0; bottom: max(12px, env(safe-area-inset-bottom));
    display: grid; grid-template-columns: 1fr 1fr; gap: 12px; padding: 0 max(14px, env(safe-area-inset-left)) 0 max(14px, env(safe-area-inset-right));
    user-select: none; -webkit-user-select: none; pointer-events: none;
  }
  .touch button {
    pointer-events: auto; font-size: 24px; border-radius: 22px; background: rgba(10,10,10,.58);
    height: 88px; border: 2px solid rgba(255,255,255,.56); box-shadow: 0 5px 20px rgba(0,0,0,.45);
  }
  .touch button:active { transform: scale(.98); background: rgba(255,255,255,.20); }
  @media (pointer: fine) { .touch, .tap-hint { display: none; } }
  @media (max-width: 640px) {
    .panel { right: max(10px, env(safe-area-inset-right)); max-width: none; font-size: 12px; }
    .row { gap: 6px; }
    button { min-height: 40px; padding: 7px 10px; }
    .details { display: none; }
  }
</style>
</head>
<body>
<canvas id="sim"></canvas>
<div class="panel compact" id="panel">
  <b>Bike Map Simulator</b><br />
  <span class="details">バイクは自動前進します。操作は左右のみです。<br />A / ←: 左へ曲がる　D / →: 右へ曲がる<br />R: スタートへ戻る　+ / -: ズーム</span>
  <div class="row">
    <button id="setStartBtn">スタート指定</button>
    <button id="resetBtn">戻る</button>
    <button id="rewindBtn">巻き戻し</button>
    <button id="moveBikeBtn">バイク移動</button>
    <button id="pauseBtn">一時停止</button>
    <button id="zoomOutBtn">−</button>
    <button id="zoomInBtn">＋</button>
    <button id="compactBtn">表示</button>
  </div>
  <div class="hint" id="modeHint">スマホでは画面左半分を押すと左、右半分を押すと右へ曲がります。</div>
  <div class="hint" id="status">loading...</div>
</div>
<div class="tap-hint">画面左半分: 左へ曲がる　/　右半分: 右へ曲がる</div>
<div class="touch" aria-label="touch controls">
  <button id="left">← 左</button><button id="right">右 →</button>
</div>

  const PX_TO_M = 0.20; // 仮スケール: 1 px = 0.20 m。実寸が分かればここを調整してください。
  const AUTO_SPEED = 56; // px/s。左右だけで操作しやすい固定速度。

  const canvas = document.getElementById('sim');
  const ctx = canvas.getContext('2d');
  const panel = document.getElementById('panel');
  const status = document.getElementById('status');
  const modeHint = document.getElementById('modeHint');
  const setStartBtn = document.getElementById('setStartBtn');
  const resetBtn = document.getElementById('resetBtn');
  const rewindBtn = document.getElementById('rewindBtn');
  const moveBikeBtn = document.getElementById('moveBikeBtn');
  const pauseBtn = document.getElementById('pauseBtn');
  const zoomOutBtn = document.getElementById('zoomOutBtn');
  const zoomInBtn = document.getElementById('zoomInBtn');
  const compactBtn = document.getElementById('compactBtn');

  const keys = Object.create(null);
  const mapImg = new Image();
  let mapReady = false;
  let zoom = 2.15;
  let dpr = window.devicePixelRatio || 1;
  let lastTs = 0;
  // view is the world-to-screen transform in CSS pixels.
  let view = { a: 1, cos: 1, sin: 0, tx: 0, ty: 0 };
  let flashMessage = '';
  let flashUntil = 0;

  const bike = {
    x: 112, y: 330,
    heading: -Math.PI / 2,
    speed: 0,
    turnRate: 2.35
  };
  const start = { x: bike.x, y: bike.y, heading: bike.heading };

  let startMode = false;
  let pendingStart = null;
  let draggingStart = false;
  let moveBikeMode = false;
  let draggingBike = false;
  let bikeDragPointerId = null;
  let lastBikeDragPoint = null;
  let paused = false;
  let rewinding = false;
  let rewindAccumulator = 0;
  let steerPointerId = null;
  const history = [];
  let historyAccumulator = 0;
  const HISTORY_INTERVAL = 0.05;
  const HISTORY_MAX = 900;

  function resize() {
    dpr = window.devicePixelRatio || 1;
    canvas.width = Math.floor(innerWidth * dpr);
    canvas.height = Math.floor(innerHeight * dpr);
    canvas.style.width = innerWidth + 'px';
    canvas.style.height = innerHeight + 'px';
  }
  addEventListener('resize', resize);
  resize();

  function loadImage(img, src, onload) {
    img.onload = onload;
    img.onerror = () => { status.textContent = '画像の読み込みに失敗しました'; };
    img.src = src;
  }

  loadImage(mapImg, MAP_SRC, () => { mapReady = true; });

  function nowMs() { return performance.now(); }
  function flash(text) { flashMessage = text; flashUntil = nowMs() + 1800; }
  function clamp(v, lo, hi) { return Math.max(lo, Math.min(hi, v)); }
  function input(name) { return !!keys[name]; }

  function pushHistory(dt) {
    historyAccumulator += dt;
    if (historyAccumulator < HISTORY_INTERVAL) return;
    historyAccumulator = 0;
    history.push({ x: bike.x, y: bike.y, heading: bike.heading });
    if (history.length > HISTORY_MAX) history.shift();
  }

  function clearHistory() {
    history.length = 0;
    historyAccumulator = 0;
    rewindAccumulator = 0;
  }

  function applyState(st) {
    bike.x = st.x;
    bike.y = st.y;
    bike.heading = st.heading;
    bike.speed = 0;
  }

  function rewindStep(dt) {
    bike.speed = 0;
    rewindAccumulator += dt;
    const stepInterval = 0.035;
    while (rewindAccumulator >= stepInterval && history.length > 0) {
      const st = history.pop();
      applyState(st);
      rewindAccumulator -= stepInterval;
    }
    if (history.length === 0) {
      rewinding = false;
      rewindBtn.classList.remove('active');
      flash('これ以上巻き戻せません');
    }
  }

  function isAsphalt(x, y) {
    if (!mapReady) return true;
    return x >= 0 && y >= 0 && x < mapImg.width && y < mapImg.height;
  }

  function canPlaceAt(x, y, heading) {
    // Top-down motorcycle footprint. x-axis is forward, y-axis is lateral.
    const samples = [
      [0, 0], [9, 0], [-9, 0], [0, 4.5], [0, -4.5],
      [7, 4.5], [7, -4.5], [-7, 4.5], [-7, -4.5],
      [13, 0], [-13, 0]
    ];
    const c = Math.cos(heading), s = Math.sin(heading);
    for (const [sx, sy] of samples) {
      const wx = x + sx * c - sy * s;
      const wy = y + sx * s + sy * c;
      if (!isAsphalt(wx, wy)) return false;
    }
    return true;
  }

  function resetBike() {
    bike.x = start.x;
    bike.y = start.y;
    bike.heading = start.heading;
    bike.speed = 0;
    clearHistory();
  }

  function update(dt) {
    if (rewinding) {
      rewindStep(dt);
      return;
    }
    if (startMode || moveBikeMode || paused) {
      bike.speed = 0;
      return;
    }

    pushHistory(dt);

    const left = input('a') || input('arrowleft') || input('touch_left');
    const right = input('d') || input('arrowright') || input('touch_right');
    const steer = (right ? 1 : 0) - (left ? 1 : 0);

    bike.heading += steer * bike.turnRate * dt;
    bike.speed += (AUTO_SPEED - bike.speed) * (1 - Math.pow(0.05, dt));

    const nx = bike.x + Math.cos(bike.heading) * bike.speed * dt;
    const ny = bike.y + Math.sin(bike.heading) * bike.speed * dt;
    if (canPlaceAt(nx, ny, bike.heading)) {
      bike.x = nx;
      bike.y = ny;
    } else {
      bike.speed = 0;
      flash('マップの端です');
    }

    bike.x = clamp(bike.x, 0, mapImg.width || 555);
    bike.y = clamp(bike.y, 0, mapImg.height || 434);
  }

  function computeView() {
    const w = innerWidth, h = innerHeight;
    const a = zoom;
    // Rotate the world so the bike heading always points to screen-up.
    const theta = -Math.PI / 2 - bike.heading;
    const cos = Math.cos(theta), sin = Math.sin(theta);
    const focusX = w * 0.50;
    const focusY = h * 0.62;
    const rx = a * (cos * bike.x - sin * bike.y);
    const ry = a * (sin * bike.x + cos * bike.y);
    const tx = focusX - rx;
    const ty = focusY - ry;
    view = { a, cos, sin, tx, ty };
  }

  function setWorldTransform() {
    ctx.setTransform(
      dpr * view.a * view.cos,
      dpr * view.a * view.sin,
      -dpr * view.a * view.sin,
      dpr * view.a * view.cos,
      dpr * view.tx,
      dpr * view.ty
    );
  }

  function setScreenTransform() {
    ctx.setTransform(dpr, 0, 0, dpr, 0, 0);
  }

  function screenToMap(clientX, clientY) {
    const dx = clientX - view.tx;
    const dy = clientY - view.ty;
    return {
      x: (view.cos * dx + view.sin * dy) / view.a,
      y: (-view.sin * dx + view.cos * dy) / view.a
    };
  }

  function drawMap() {
    ctx.save();
    setWorldTransform();
    ctx.imageSmoothingEnabled = true;
    ctx.drawImage(mapImg, 0, 0);


    ctx.lineWidth = 1 / view.a;
    ctx.strokeStyle = 'rgba(255,255,255,.65)';
    ctx.strokeRect(0, 0, mapImg.width, mapImg.height);
    ctx.restore();
  }

  function drawArrow(x, y, heading, fill, stroke, scale = 1) {
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(heading);
    ctx.fillStyle = fill;
    ctx.strokeStyle = stroke;
    ctx.lineWidth = 1.2 / view.a;
    ctx.beginPath();
    ctx.moveTo(16 * scale, 0);
    ctx.lineTo(-9 * scale, -7 * scale);
    ctx.lineTo(-5 * scale, 0);
    ctx.lineTo(-9 * scale, 7 * scale);
    ctx.closePath();
    ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function drawStartMarker() {
    ctx.save();
    setWorldTransform();
    ctx.strokeStyle = 'rgba(255,235,0,.95)';
    ctx.fillStyle = 'rgba(255,235,0,.18)';
    ctx.lineWidth = 2 / view.a;
    ctx.beginPath(); ctx.arc(start.x, start.y, 12, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    drawArrow(start.x, start.y, start.heading, 'rgba(255,230,0,.85)', 'rgba(40,40,0,.95)', 0.8);

    if (pendingStart) {
      ctx.strokeStyle = 'rgba(0,255,180,.95)';
      ctx.fillStyle = 'rgba(0,255,180,.20)';
      ctx.lineWidth = 2 / view.a;
      ctx.beginPath(); ctx.arc(pendingStart.x, pendingStart.y, 13, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
      drawArrow(pendingStart.x, pendingStart.y, pendingStart.heading, 'rgba(0,255,180,.85)', 'rgba(0,45,30,.95)', 0.9);
    }
    ctx.restore();
  }

  function drawBike() {
    ctx.save();
    setWorldTransform();
    ctx.translate(bike.x, bike.y);
    ctx.rotate(bike.heading);

    ctx.fillStyle = 'rgba(0,0,0,.35)';
    ctx.beginPath();
    ctx.ellipse(-1.5, 1.8, 7, 14, 0, 0, Math.PI * 2);
    ctx.fill();

    ctx.fillStyle = '#e33';
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = 1.2;
    ctx.beginPath();
    ctx.moveTo(16, 0);
    ctx.lineTo(-10, -6);
    ctx.lineTo(-7, 0);
    ctx.lineTo(-10, 6);
    ctx.closePath();
    ctx.fill(); ctx.stroke();

    ctx.fillStyle = '#111';
    ctx.strokeStyle = '#eee';
    ctx.lineWidth = 0.8;
    ctx.beginPath(); ctx.ellipse(10, 0, 2.4, 4.6, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.beginPath(); ctx.ellipse(-8, 0, 2.4, 4.6, 0, 0, Math.PI * 2); ctx.fill(); ctx.stroke();
    ctx.restore();
  }

  function drawHUD() {
    const kmh = Math.abs(bike.speed) * PX_TO_M * 3.6;
    let text = `速度: ${kmh.toFixed(1)} km/h　位置: (${bike.x.toFixed(0)}, ${bike.y.toFixed(0)})　スタート: (${start.x.toFixed(0)}, ${start.y.toFixed(0)})　ズーム: ${zoom.toFixed(2)}x`;
    if (paused) text += '　<span class="warning">一時停止中</span>';
    if (rewinding) text += '　<span class="warning">巻き戻し中</span>';
    if (moveBikeMode) text += '　<span class="warning">バイク移動中</span>';
    if (nowMs() < flashUntil) text += `　<span class="warning">${flashMessage}</span>`;
    status.innerHTML = text;
    if (startMode) {
      modeHint.innerHTML = 'スタート指定中: <b>マップ内でドラッグ</b>してください。押した位置がスタート、ドラッグ方向が向きになります。';
    } else if (moveBikeMode) {
      modeHint.innerHTML = 'バイク移動中: <b>画面上でドラッグ</b>するとバイクを移動できます。ドラッグ方向が向きになります。';
    } else {
      modeHint.innerHTML = 'スマホ: 画面左半分を押すと左、右半分を押すと右へ曲がります。巻き戻しはボタン長押しです。';
    }
  }

  function render() {
    computeView();
    setScreenTransform();
    ctx.clearRect(0, 0, innerWidth, innerHeight);
    if (!mapReady) return;
    drawMap();
    drawStartMarker();
    drawBike();
    drawHUD();
  }

  function loop(ts) {
    if (!lastTs) lastTs = ts;
    const dt = clamp((ts - lastTs) / 1000, 0, 0.05);
    lastTs = ts;
    if (mapReady) update(dt);
    render();
    requestAnimationFrame(loop);
  }
  requestAnimationFrame(loop);

  function clearTouchSteer() {
    keys.touch_left = false;
    keys.touch_right = false;
    steerPointerId = null;
  }

  function setTouchSteerFromX(clientX) {
    const leftSide = clientX < innerWidth * 0.5;
    keys.touch_left = leftSide;
    keys.touch_right = !leftSide;
  }

  function setStartMode(on) {
    if (on) setBikeMoveMode(false);
    startMode = on;
    pendingStart = null;
    draggingStart = false;
    clearTouchSteer();
    setStartBtn.classList.toggle('active', startMode);
    setStartBtn.textContent = startMode ? 'キャンセル' : 'スタート指定';
    if (startMode) bike.speed = 0;
  }

  function setBikeMoveMode(on) {
    if (on) setStartMode(false);
    moveBikeMode = on;
    draggingBike = false;
    bikeDragPointerId = null;
    lastBikeDragPoint = null;
    clearTouchSteer();
    moveBikeBtn.classList.toggle('active', moveBikeMode);
    moveBikeBtn.textContent = moveBikeMode ? '移動終了' : 'バイク移動';
    if (moveBikeMode) {
      bike.speed = 0;
      flash('バイクをドラッグして移動できます');
    }
  }

  function finalizeStart() {
    if (!pendingStart) return;
    if (!canPlaceAt(pendingStart.x, pendingStart.y, pendingStart.heading)) {
      flash('スタート位置はマップ内に置いてください');
      return;
    }
    start.x = pendingStart.x;
    start.y = pendingStart.y;
    start.heading = pendingStart.heading;
    setStartMode(false);
    resetBike();
    flash('スタート位置を更新しました');
  }


  function moveBikeToPointer(ev) {
    const p = screenToMap(ev.clientX, ev.clientY);
    const x = clamp(p.x, 0, mapImg.width || 555);
    const y = clamp(p.y, 0, mapImg.height || 434);
    if (lastBikeDragPoint) {
      const dx = x - lastBikeDragPoint.x;
      const dy = y - lastBikeDragPoint.y;
      if (Math.hypot(dx, dy) > 2) bike.heading = Math.atan2(dy, dx);
    }
    bike.x = x;
    bike.y = y;
    bike.speed = 0;
    lastBikeDragPoint = { x, y };
  }

  canvas.addEventListener('pointerdown', (ev) => {
    if (moveBikeMode) {
      ev.preventDefault();
      draggingBike = true;
      bikeDragPointerId = ev.pointerId;
      lastBikeDragPoint = null;
      clearHistory();
      moveBikeToPointer(ev);
      try { canvas.setPointerCapture(ev.pointerId); } catch (_) {}
      return;
    }
    if (!startMode) {
      if (ev.pointerType !== 'mouse') {
        ev.preventDefault();
        steerPointerId = ev.pointerId;
        setTouchSteerFromX(ev.clientX);
        try { canvas.setPointerCapture(ev.pointerId); } catch (_) {}
      }
      return;
    }
    ev.preventDefault();
    const p = screenToMap(ev.clientX, ev.clientY);
    const heading = bike.heading;
    if (!canPlaceAt(p.x, p.y, heading)) {
      flash('マップ内を指定してください');
      return;
    }
    pendingStart = { x: p.x, y: p.y, heading };
    draggingStart = true;
    canvas.setPointerCapture(ev.pointerId);
  });

  canvas.addEventListener('pointermove', (ev) => {
    if (moveBikeMode && draggingBike && bikeDragPointerId === ev.pointerId) {
      ev.preventDefault();
      moveBikeToPointer(ev);
      return;
    }
    if (!startMode && steerPointerId === ev.pointerId) {
      ev.preventDefault();
      setTouchSteerFromX(ev.clientX);
      return;
    }
    if (!startMode || !draggingStart || !pendingStart) return;
    ev.preventDefault();
    const p = screenToMap(ev.clientX, ev.clientY);
    const dx = p.x - pendingStart.x;
    const dy = p.y - pendingStart.y;
    if (Math.hypot(dx, dy) > 4) pendingStart.heading = Math.atan2(dy, dx);
  });

  function endPointer(ev) {
    if (moveBikeMode && draggingBike && bikeDragPointerId === ev.pointerId) {
      ev.preventDefault();
      draggingBike = false;
      bikeDragPointerId = null;
      lastBikeDragPoint = null;
      try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
      flash('バイク位置を移動しました');
      return;
    }
    if (!startMode && steerPointerId === ev.pointerId) {
      ev.preventDefault();
      clearTouchSteer();
      try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
      return;
    }
    if (!startMode || !draggingStart) return;
    ev.preventDefault();
    draggingStart = false;
    try { canvas.releasePointerCapture(ev.pointerId); } catch (_) {}
    finalizeStart();
  }
  canvas.addEventListener('pointerup', endPointer);
  canvas.addEventListener('pointercancel', endPointer);

  addEventListener('keydown', (ev) => {
    const k = ev.key.toLowerCase();
    keys[k] = true;
    if (k === 'z' || k === 'backspace') { rewinding = true; rewindBtn.classList.add('active'); }
    if (k === 'b') setBikeMoveMode(!moveBikeMode);
    if (k === 'r') resetBike();
    if (k === ' ' || k === 'p') {
      paused = !paused;
      pauseBtn.textContent = paused ? '再開' : '一時停止';
    }
    if (k === '+' || k === '=') zoom = clamp(zoom + 0.12, 0.8, 4.0);
    if (k === '-' || k === '_') zoom = clamp(zoom - 0.12, 0.8, 4.0);
    if (ev.key === 'Escape' && startMode) setStartMode(false);
    if (ev.key === 'Escape' && moveBikeMode) setBikeMoveMode(false);
  });
  addEventListener('keyup', (ev) => {
    const k = ev.key.toLowerCase();
    keys[k] = false;
    if (k === 'z' || k === 'backspace') { rewinding = false; rewindBtn.classList.remove('active'); }
  });
  addEventListener('contextmenu', (ev) => ev.preventDefault());
  addEventListener('touchmove', (ev) => ev.preventDefault(), { passive: false });

  resetBtn.addEventListener('click', resetBike);
  setStartBtn.addEventListener('click', () => setStartMode(!startMode));
  moveBikeBtn.addEventListener('click', () => setBikeMoveMode(!moveBikeMode));

  function startRewindButton(e) {
    e.preventDefault();
    if (history.length === 0) {
      flash('巻き戻し履歴がありません');
      return;
    }
    setStartMode(false);
    setBikeMoveMode(false);
    clearTouchSteer();
    rewinding = true;
    rewindBtn.classList.add('active');
    try { rewindBtn.setPointerCapture(e.pointerId); } catch (_) {}
  }
  function stopRewindButton(e) {
    e.preventDefault();
    rewinding = false;
    rewindBtn.classList.remove('active');
    try { rewindBtn.releasePointerCapture(e.pointerId); } catch (_) {}
  }
  rewindBtn.addEventListener('pointerdown', startRewindButton);
  rewindBtn.addEventListener('pointerup', stopRewindButton);
  rewindBtn.addEventListener('pointercancel', stopRewindButton);
  rewindBtn.addEventListener('lostpointercapture', () => { rewinding = false; rewindBtn.classList.remove('active'); });
  pauseBtn.addEventListener('click', () => {
    paused = !paused;
    pauseBtn.textContent = paused ? '再開' : '一時停止';
    clearTouchSteer();
  });
  zoomOutBtn.addEventListener('click', () => { zoom = clamp(zoom - 0.12, 0.8, 4.0); });
  zoomInBtn.addEventListener('click', () => { zoom = clamp(zoom + 0.12, 0.8, 4.0); });
  compactBtn.addEventListener('click', () => {
    panel.classList.toggle('compact');
    compactBtn.textContent = panel.classList.contains('compact') ? '表示' : '隠す';
  });

  function bindTouch(id, key) {
    const el = document.getElementById(id);
    const down = (e) => { e.preventDefault(); keys[key] = true; try { el.setPointerCapture(e.pointerId); } catch (_) {} };
    const up = (e) => { e.preventDefault(); keys[key] = false; try { el.releasePointerCapture(e.pointerId); } catch (_) {} };
    el.addEventListener('pointerdown', down);
    el.addEventListener('pointerup', up);
    el.addEventListener('pointercancel', up);
    el.addEventListener('lostpointercapture', up);
  }
  bindTouch('left', 'touch_left');
  bindTouch('right', 'touch_right');
})();
</script>
</body>
</html>
